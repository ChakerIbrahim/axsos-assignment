<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Likes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main" >
        <div class="blacktopbar" >
            <h1>Network</h1>
        </div>
        <div class="yourfeed" >
            <h2>Your Feed</h2>
        </div>
    <div class="flex" >   
        <div class="profilepic" >
            <img src="user-profile-icon-vector-avatar-600nw-2558760599.webp" alt="avatarpic">
            <a href="#">Add an avatar</a>
            <h3>James Doe</h3>
        </div>
    <div class="profiles" >  
        <div class="neilm" >
            <div class="separate" >
                <h4>Neil M</h4>
                <p><span class="likes1" >9</span> likes(s)</p>
                <button onclick="likes('1')" >Like</button>
            </div>
            <div class="separate2" >
                <p>I just setp up this new discord bot, let me </p>
                <p>know what you all think. <a href="#">link</a></p>
            </div>
            
        </div>
        <div class="nicholek" >
            <div class="separate" >
                <h4>Nichole K</h4>
                <p> <span class="likes2" >12</span> like(s)</p>
                <button class="buttom2" onclick="likes(2)" >Like</button>
            </div>
            
            <p class="separate2" >Just finished my <a href="#">next comic</a>, check it out</p>
        </div>
        <div class="jimr" >
            <div class="separate" >
                <h4>Jim R</h4>
                <p><span class="likes3" >9</span>like(s)</p>
                <button onclick="likes(3)"  >Like</button>
            </div>
            
            <p class="separate2" >I can't stop listening to the <a href="#">new album</a>.</p>
            <p class="separate2" >Who else is liking it?</p>
        </div>
    </div>     
    </div>  
    </div>

<script src="script.js" ></script>
</body>
</html>
