<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Subscription Plans</h1>
    <div class="cards">
        <div class="card starter">
            <div class="center">
                <h2>Starter</h2>
                <h1>$9/mo</h1>
            </div>

            <div>
                <p>5 Projects included</p>
                <p>Email Support</p>
                <p>Single User License</p>
            </div>

        </div>
        <div class="card professional">
            <div class="center">
                <h2>Professional</h2>
                <h1>$19/mo</h1>
            </div>

            <p>25 Projects</p>
            <p>Priority Support</p>
            <p>Team Acess</p>
        </div>
        <div class="card enterprise">
            <div class="center">
                <h2>Enterprise</h2>
                <h1>$49/mo</h1>
            </div>

            <p>Unlimited Projects</p>
            <p>24/7 Support</p>
            <p>Advanced Tools</p>
        </div>
    </div>
    <h2 class="head">Contact Us</h2>
    <div class="
    
    
    
    bottomwhitebar">
        <form action="#" method="#">
            <input type="name" placeholder="Full Name" required class="input-name">
            <input type="email" placeholder="Email Address">
            <textarea name="message" id="message" placeholder="Your Message..." required></textarea>
            <button>Send Message</button>
        </form>

    </div>
</body>

</html>
