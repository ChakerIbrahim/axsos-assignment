<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Button Playground</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <h1>Interactive Button Playground</h1>
        <button class="bluebox">Hover Me</button>
        <button class="purplebox">Press Me</button>
        <button class="orangebox">Focus On Me</button>
        <button class="greenbox">Hover to Grow</button>
        <button disabled class="graybox">Disabled Button</button>
    </div>
</body>
</html>
