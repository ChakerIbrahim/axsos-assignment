<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <img class="headimg" src="music-note.png" alt="song">
        <h1>Audio Example</h1>
    </div>
        <div class="main">
        <div class="music-main">
            <div class="music-sub">
                <img class="musicimg" src="eEczyEMDd2BLa3dtkGJVE9Id.webp" alt="music">
            </div>
            <h2>Now playing</h2>
            <h1>The Last Of us - Theme song</h1>
            <h4>By Gustavo Santaolalla</h4>
            <audio class="thelastofus"   controls>
                <source src="The Last Of us - Theme song.mp3" >
                <source src="The Last Of us - Theme song - etienne8489 (128k).ogg" >
            </audio>
        </div>
        <div class="playlist-main">
            <h2>Playlist</h2>
            <p>Track 1 — The Last Of us - Theme song</p>
            <p>Track 2 — Billie Eilish - What Was I Made For?</p>
            <p>Track 3 — Macklemore & Ryan Lewis - Can't Hold Us </p>
            <p>Track 4 — RÜFÜS DU SOL ●● Innerbloom </p>
        </div>
            
    </div>
    



<script src="script.js" ></script>
</body>
</html>
