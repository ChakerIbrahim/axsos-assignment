<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG House Structure</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <svg width="100%" height="100%">
    <line x1="0" y1="75%" x2="100%" y2="75%" style="stroke:green;stroke-width:12" />
    
    <rect x="600" y="250" width="750" height="450" stroke-width="5" stroke="black" fill="beige" />

    <rect x="650" y="350" width="150" height="150" stroke-width="5" stroke="black" fill="cyan" />

    <polygon points="975,10  550,250  1400,250" style="fill:red;stroke:black;stroke-width:3" />

    <circle cx="1500" cy="150" r="90" stroke="gray" stroke-width="0" fill="yellow" />
    <rect x="900" y="500" width="127" height="195" fill="brown" stroke="black" stroke-width="5" />
  </svg>
</body>

</html>
