<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HTML Table Assignment</title>
  <!-- Bootstrap 5 CDN -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0d0f14;
      --surface:   #161a23;
      --border:    #252b38;
      --accent:    #5b8cff;
      --accent2:   #ff6b6b;
      --text:      #e8eaf0;
      --muted:     #6b7280;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card-wrapper {
      width: 100%;
      max-width: 780px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2.4rem;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 0;
    }

    thead tr {
      background: var(--border);
    }

    thead th {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 1rem 1.5rem;
      border: none;
    }

    tbody tr {
      border-top: 1px solid var(--border);
      transition: background 0.15s ease;
    }

    tbody tr:hover {
      background: rgba(91, 140, 255, 0.06);
    }

    tbody td {
      padding: 1rem 1.5rem;
      font-size: 0.95rem;
      color: var(--text);
      border: none;
    }

    .full-name {
      font-weight: 500;
      color: var(--accent2);
    }

    .badge-count {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 0.72rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      border-radius: 999px;
      padding: 0.15rem 0.65rem;
      margin-left: 0.5rem;
      vertical-align: middle;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

<div class="card-wrapper">
  <h1>User <span>Directory</span></h1>
  <p class="subtitle">
    {{ users|length }} users loaded from route
    <span class="badge-count">{{ users|length }}</span>
  </p>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Full Name</th>
        </tr>
      </thead>
      <tbody>
        {% for user in users %}
        <tr>
          <td>{{ user['first_name'] }}</td>
          <td>{{ user['last_name'] }}</td>
          <td class="full-name">{{ user['first_name'] }} {{ user['last_name'] }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
